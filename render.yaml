services:
  # ── FastAPI Backend ─────────────────────────────────────────────
  - type: web
    name: thyroid-classifier-api
    runtime: docker
    dockerfilePath: ./Dockerfile.api
    envVars:
      - key: PYTHON_ENV
        value: production
    healthCheckPath: /health
    autoDeploy: true

  # ── Streamlit Frontend ──────────────────────────────────────────
  - type: web
    name: thyroid-classifier-ui
    runtime: docker
    dockerfilePath: ./Dockerfile.ui
    envVars:
      - key: API_URL
        fromService:
          name: thyroid-classifier-api
          type: web
          property: host
    autoDeploy: true